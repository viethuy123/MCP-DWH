name: Deploy Postgres HR MCP
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SSH and Smart Deploy HR MCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 7001
          script: |
            set -e
            cd /home/user/warehouse/postgres-hr-mcp
            
            # Lấy SHA hiện tại trước khi pull
            BEFORE_SHA=$(git rev-parse HEAD)
            
            # Pull code mới
            git pull origin main
            
            # Lấy SHA sau khi pull
            AFTER_SHA=$(git rev-parse HEAD)
            
            echo "🔍 Checking changes: $BEFORE_SHA → $AFTER_SHA"
            
            # Kiểm tra xem có thay đổi không
            if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
              echo "ℹ️  No changes detected, skipping deployment"
              exit 0
            fi
            
            # Kiểm tra các file cấu hình có thay đổi không
            if git diff --name-only $BEFORE_SHA $AFTER_SHA | grep -qE "(Dockerfile|docker-compose\.ya?ml|requirements\.txt|package\.json)"; then
              echo "🔨 Config/dependency files changed - Rebuilding containers..."
              docker-compose down
              docker-compose up -d --build
            else
              echo "📝 Only source code changed - Restarting containers..."
              docker-compose restart
            fi
            
            # Cleanup old images (optional)
            docker image prune -f
            
            echo "✅ HR MCP deployment completed!"
